name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/scraping_scripts/**'
      - 'README.md'
      - 'docs/**'
      - '**.md'
      # Add any other paths you want to exclude

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - space: ai-tutor
            dockerfile: Dockerfile
          - space: ai-tutor-chatbot
            dockerfile: Dockerfile.gradio
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Swap in target Dockerfile
        if: matrix.dockerfile != 'Dockerfile'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          cp "${{ matrix.dockerfile }}" Dockerfile
          git add Dockerfile
          git commit -m "Use ${{ matrix.dockerfile }} for ${{ matrix.space }} space"

      - name: Push to HuggingFace Space (${{ matrix.space }})
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: git push --force "https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/towardsai-tutors/${{ matrix.space }}" main:main
