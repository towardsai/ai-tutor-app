name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        # setup-uv stopped publishing major tags (v8+); pin the exact release.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dev tooling
        run: uv sync --only-dev --frozen

      - name: Format check
        run: uv run --no-sync ruff format --check .

      - name: Lint check
        run: uv run --no-sync ruff check .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # run_kb_command sandbox tests shell out to ripgrep; without it they skip.
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        # setup-uv stopped publishing major tags (v8+); pin the exact release.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install project
        run: uv sync --frozen

      # Live model-backed tests stay skipped here (no RUN_LIVE_* / no API keys);
      # they are run manually/locally. CI guards the offline suite only.
      - name: Run tests
        run: uv run --no-sync pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        run: npm ci

      - name: Test frontend
        run: npm test

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
